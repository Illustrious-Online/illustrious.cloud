name: "[illustrious.cloud] Execute checks & tests"
permissions:
  contents: read
  pull-requests: write
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  cloud-check-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: illustrious
      DB_USERNAME: admin
      DB_PASSWORD: illustrious
      DB_SSL: "false"
      TEST_DB_NAME: illustrious
      # Empty = skip verification in development (per recaptcha/service.ts)
      RECAPTCHA_SECRET_KEY: ""
      # Dummy secret for better-auth (min 32 chars)
      BETTER_AUTH_SECRET: "test-secret-for-ci-min-32-characters-long"
    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: illustrious
          POSTGRES_DB: illustrious
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      ### Install server dependencies
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      ### Clone repository & install application dependencies
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Run migrations
        run: bunx drizzle-kit migrate
      ### Run checks and tests
      - name: Run Biome Checks
        run: bun run check
      - name: Run unit tests with coverage
        run: mkdir -p reports && bun test --coverage
      ### Upload coverage reports
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: illustrious-cloud
          files: ./coverage/lcov.info
          slug: Illustrious-Online/illustrious.cloud
      - name: Upload JUnit reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: illustrious-cloud
          files: ./reports/junit.xml
          slug: Illustrious-Online/illustrious.cloud