replicaCount: 2

# Secret containing DB_*, BETTER_AUTH_SECRET, OAuth credentials, etc.
# Create with: kubectl create secret generic ill-cloud-secrets -n ill-cloud --from-env-file=production.env
secrets:
  name: ill-cloud-secrets

deployment:
  namespace: ill-cloud

image:
  repository: illustriousonline/ill-cloud
  tag: 2.0.5
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: api.illustrious.cloud
  path: /
  pathType: Prefix
  tlsSecretName: api-tls

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
