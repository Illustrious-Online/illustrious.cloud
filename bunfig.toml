[test]
coverage = true
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
    "**/tests/**",
    "**/drizzle/**",
    "**/utils/**",
    "**/plugins/error.ts",
    "**/modules/auth/middleware.ts"
]
coverageThreshold = { lines = 0.85, functions = 0.85 }
coverageReporter = ["text", "lcov"]
preload = ["./src/modules/tests/setup.ts"]
